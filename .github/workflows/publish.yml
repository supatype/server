name: Publish to Docker Hub

on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Decide whether to update Docker Hub latest tag
        id: docker_latest
        shell: bash
        run: |
          set -euo pipefail
          VERSION='${{ inputs.version }}'
          VERSION_LC=$(echo "$VERSION" | tr '[:upper:]' '[:lower:]')
          IS_PRE=false
          case "$VERSION_LC" in
            *alpha*|*beta*|*-rc*|*.rc.*|*preview*) IS_PRE=true ;;
          esac

          HAS_STABLE=false
          while IFS= read -r t; do
            [[ -z "${t:-}" ]] && continue
            rest="${t#v}"
            [[ "$rest" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]] || continue
            HAS_STABLE=true
            break
          done < <(git tag -l 'v[0-9]*')

          if [[ "$IS_PRE" != true ]] || [[ "$HAS_STABLE" != true ]]; then
            echo "docker_push_latest=true" >> "$GITHUB_OUTPUT"
          else
            echo "docker_push_latest=false" >> "$GITHUB_OUTPUT"
          fi

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            supatype/auth
          tags: |
            type=raw,value=v${{ inputs.version }}
            type=raw,value=latest,enable=${{ steps.docker_latest.outputs.docker_push_latest == 'true' }}

      - uses: docker/setup-qemu-action@v3
        with:
          platforms: amd64,arm64

      - run: |
          set -ex

          echo "Adding explicit release version to Dockerfile..."

          sed -i 's/RELEASE_VERSION=unspecified/RELEASE_VERSION=${{ inputs.version }}/' Dockerfile

      - uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
