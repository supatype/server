# Phase 10.6 A25 — cross-compile supatype-server (supatype-auth/cmd) for common platforms.
# Produces uploadable artefacts; CDN upload + minisign (A27) and Apple signing (A26) extend this workflow later.
name: Server release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build (${{ matrix.goos }}-${{ matrix.goarch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            runner: ubuntu-24.04
          - goos: linux
            goarch: arm64
            runner: ubuntu-24.04
          - goos: darwin
            goarch: amd64
            runner: macos-13
          - goos: darwin
            goarch: arm64
            runner: macos-14

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          set -euo pipefail
          out="supatype-server-${{ matrix.goos }}-${{ matrix.goarch }}"
          go build -trimpath -ldflags="-s -w" -o "$out" ./cmd

      - name: Strip (Unix)
        run: |
          bin="supatype-server-${{ matrix.goos }}-${{ matrix.goarch }}"
          if command -v strip >/dev/null 2>&1; then strip "$bin" || true; fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: server-${{ matrix.goos }}-${{ matrix.goarch }}
          path: supatype-server-${{ matrix.goos }}-${{ matrix.goarch }}
          if-no-files-found: error
          retention-days: 14
