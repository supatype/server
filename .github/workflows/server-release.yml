# Phase 10.6 A25 — cross-compile supatype-server, strip, publish binaries to CDN,
# combined SHA256 checksums + minisign (same pattern as engine), GitHub Release assets.
# Optional Windows amd64 build; A25 core targets: linux/amd64, linux/arm64, darwin/amd64, darwin/arm64.
name: Server release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: Version string (e.g. v0.1.0)
        required: true

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            runner: ubuntu-24.04
            cross: false
          - goos: linux
            goarch: arm64
            runner: ubuntu-24.04
            cross: true
          - goos: darwin
            goarch: amd64
            runner: macos-13
            cross: false
          - goos: darwin
            goarch: arm64
            runner: macos-14
            cross: false
          - goos: windows
            goarch: amd64
            runner: ubuntu-24.04
            cross: false

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install cross-compile toolchain (linux/arm64)
        if: matrix.cross == true
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build binary
        id: build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
          CC: ${{ matrix.cross == true && 'aarch64-linux-gnu-gcc' || '' }}
        run: |
          VERSION="${{ github.ref_name || inputs.version }}"
          EXT="${{ matrix.goos == 'windows' && '.exe' || '' }}"
          OUTPUT="supatype-server-${{ matrix.goos }}-${{ matrix.goarch }}${EXT}"
          go build \
            -trimpath \
            -ldflags="-s -w -X github.com/supatype/auth/internal/utilities.Version=${VERSION}" \
            -o "${OUTPUT}" \
            ./cmd/
          echo "output=${OUTPUT}" >> "$GITHUB_OUTPUT"

      - name: Strip (Unix)
        if: matrix.goos != 'windows'
        run: |
          OUTPUT="${{ steps.build.outputs.output }}"
          if command -v strip >/dev/null 2>&1; then strip "$OUTPUT" || true; fi

      - name: Sign binary (macOS — best-effort)
        if: matrix.goos == 'darwin' && env.APPLE_CERT_BASE64 != ''
        env:
          APPLE_CERT_BASE64: ${{ secrets.APPLE_CERT_BASE64 }}
          APPLE_CERT_PASSWORD: ${{ secrets.APPLE_CERT_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_NOTARY_APPLE_ID: ${{ secrets.APPLE_NOTARY_APPLE_ID }}
          APPLE_NOTARY_PASSWORD: ${{ secrets.APPLE_NOTARY_PASSWORD }}
        run: |
          OUTPUT="${{ steps.build.outputs.output }}"
          echo "$APPLE_CERT_BASE64" | base64 --decode > cert.p12
          security create-keychain -p ci-keychain ci.keychain
          security import cert.p12 -k ci.keychain -P "$APPLE_CERT_PASSWORD" -T /usr/bin/codesign
          security set-keychain-settings -t 3600 -u ci.keychain
          security unlock-keychain -p ci-keychain ci.keychain
          security list-keychains -d user -s ci.keychain $(security list-keychains -d user | sed s/\"//g)
          security set-key-partition-list -S apple-tool:,apple: -s -k ci-keychain ci.keychain
          codesign --sign "Developer ID Application: Supatype Inc (${APPLE_TEAM_ID})" \
            --options runtime --timestamp --force "${OUTPUT}"
          zip "${OUTPUT}.zip" "${OUTPUT}"
          xcrun notarytool submit "${OUTPUT}.zip" \
            --apple-id "$APPLE_NOTARY_APPLE_ID" \
            --password "$APPLE_NOTARY_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait --timeout 10m || true
          rm -f "${OUTPUT}.zip"

      - name: Upload binary to CDN
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.CDN_AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.CDN_AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.CDN_AWS_REGION }}
          CDN_BUCKET: ${{ secrets.CDN_BUCKET }}
          CDN_ENDPOINT: ${{ secrets.CDN_ENDPOINT }}
        run: |
          VERSION="${{ github.ref_name || inputs.version }}"
          OUTPUT="${{ steps.build.outputs.output }}"
          aws s3 cp "${OUTPUT}" \
            "s3://${CDN_BUCKET}/server/${VERSION}/${OUTPUT}" \
            --endpoint-url "${CDN_ENDPOINT}" \
            --cache-control "public, max-age=31536000, immutable"

      - name: Upload artifact (for sign-and-release job)
        uses: actions/upload-artifact@v4
        with:
          name: server-${{ matrix.goos }}-${{ matrix.goarch }}
          path: ${{ steps.build.outputs.output }}
          retention-days: 1

  sign-and-release:
    name: Sign & Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all binaries
        uses: actions/download-artifact@v4
        with:
          pattern: server-*
          merge-multiple: true

      - name: Extract version
        run: |
          VERSION="${{ github.ref_name || inputs.version }}"
          VERSION="${VERSION#v}"
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"

      - name: Generate checksums.sha256
        run: |
          sha256sum supatype-server-* > checksums.sha256
          cat checksums.sha256

      - name: Install minisign
        run: sudo apt-get install -y minisign

      - name: Sign checksums.sha256
        env:
          MINISIGN_PRIVATE_KEY: ${{ secrets.MINISIGN_PRIVATE_KEY }}
          MINISIGN_PASSWORD: ${{ secrets.MINISIGN_PASSWORD }}
        run: |
          printf '%s' "$MINISIGN_PRIVATE_KEY" > /tmp/minisign.key
          echo "$MINISIGN_PASSWORD" | minisign \
            -S -s /tmp/minisign.key \
            -m checksums.sha256 \
            -t "supatype server releases v${VERSION}"
          rm -f /tmp/minisign.key

      - name: Configure AWS credentials (Hetzner Object Storage)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.CDN_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.CDN_AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.CDN_AWS_REGION }}

      - name: Upload checksums + signature to CDN
        run: |
          BASE="s3://${{ secrets.CDN_BUCKET }}/server/v${VERSION}"
          EP="${{ secrets.CDN_ENDPOINT }}"
          aws s3 cp checksums.sha256 "${BASE}/checksums.sha256" \
            --endpoint-url "${EP}" \
            --cache-control "public, max-age=31536000, immutable"
          aws s3 cp checksums.sha256.minisig "${BASE}/checksums.sha256.minisig" \
            --endpoint-url "${EP}" \
            --cache-control "public, max-age=31536000, immutable"

      - name: Update server/latest.json
        run: |
          EP="${{ secrets.CDN_ENDPOINT }}"
          printf '{"version":"%s","date":"%s","checksums_url":"https://releases.supatype.io/server/v%s/checksums.sha256"}\n' \
            "${VERSION}" "$(date -u +%Y-%m-%d)" "${VERSION}" > latest.json
          aws s3 cp latest.json \
            "s3://${{ secrets.CDN_BUCKET }}/server/latest.json" \
            --endpoint-url "${EP}" \
            --cache-control "no-cache, no-store, must-revalidate"

      - name: Attach all artefacts to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            supatype-server-*
            checksums.sha256
            checksums.sha256.minisig
